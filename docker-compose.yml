services:
  gateway:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - docs
      - frontend

  docs:
    build:
      context: ./docs
    expose:
      - "8080"
    depends_on:
      - db
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/postgres?sslmode=disable
    develop:
      watch:
        - action: rebuild
          path: ./docs

  frontend:
    build:
      context: ./frontend
    expose:
      - "8080"
    environment:
      API_BASE_URL: http://docs:8080
    develop:
      watch:
        - action: rebuild
          path: ./frontend

  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    expose:
      - "5432"
    ports:
      - "5432:5432"

  ws:
    build:
      context: ./ws
    depends_on:
      - db
      - redis
    expose:
      - "8080"
    environment:
      REDIS_URL: redis://redis:6379
    develop:
      watch:
        - action: rebuild
          path: ./ws

  redis:
    image: redis:7-alpine
    expose:
      - "6379"
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
