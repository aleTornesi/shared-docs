services:
  gateway:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - docs
      - frontend

  docs:
    build:
      context: .
      dockerfile: docs/Dockerfile
    expose:
      - "8080"
    depends_on:
      - db
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/postgres?sslmode=disable
    develop:
      watch:
        - action: rebuild
          path: ./docs

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    expose:
      - "8080"
    environment:
      API_BASE_URL: http://docs:8080
    develop:
      watch:
        - action: rebuild
          path: ./frontend

  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    expose:
      - "5432"
    ports:
      - "5432:5432"

  ws:
    build:
      context: .
      dockerfile: ws/Dockerfile
    depends_on:
      - db
      - redis
      - kafka
    expose:
      - "8080"
    environment:
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: kafka:9092
      KAFKA_TOPIC: doc-edits
    develop:
      watch:
        - action: rebuild
          path: ./ws

  redis:
    image: redis:7-alpine
    expose:
      - "6379"
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    expose:
      - "2181"

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      - zookeeper
    expose:
      - "9092"
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 100

  batch-processor:
    build:
      context: .
      dockerfile: kafka/Dockerfile
    depends_on:
      - db
      - kafka
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/postgres?sslmode=disable
      KAFKA_BROKERS: kafka:9092
      KAFKA_TOPIC: doc-edits
      KAFKA_GROUP_ID: batch-processor
    develop:
      watch:
        - action: rebuild
          path: ./kafka

volumes:
  pgdata:
  redisdata:
